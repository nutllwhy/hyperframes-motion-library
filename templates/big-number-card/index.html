<!doctype html>
<html lang="zh-CN" data-composition-variables='[{"id":"eyebrow","type":"string","label":"角标","default":"核心结论"},{"id":"prefix","type":"string","label":"前缀","default":"效率提升"},{"id":"value","type":"number","label":"数字","default":3.2},{"id":"unit","type":"string","label":"单位","default":"倍"},{"id":"caption","type":"string","label":"说明","default":"同样的选题流程，AI 参与后从整理资料到产出初稿明显提速。"},{"id":"accent","type":"color","label":"强调色","default":"#FF5A36"},{"id":"foreground","type":"color","label":"文字色","default":"#F4EFE7"}]'>
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{box-sizing:border-box} html,body{margin:0;width:1920px;height:1080px;overflow:hidden;background:transparent} body{font-family:sans-serif}
      #root{position:relative;width:1920px;height:1080px;color:var(--fg);background:transparent;overflow:hidden}
      .scene{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:120px}
      .card{position:relative;width:1160px;min-height:520px;padding:64px 76px;border:1px solid rgba(255,90,54,.48);border-radius:34px;background:linear-gradient(135deg,rgba(27,23,20,.9),rgba(10,9,8,.72));box-shadow:0 0 80px rgba(255,90,54,.12);overflow:hidden}
      .card:before{content:"";position:absolute;right:-120px;top:-150px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(255,90,54,.34),transparent 62%)}
      .grid{position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:120px 120px;opacity:.35}
      .content{position:relative;z-index:2}.eyebrow{display:inline-flex;padding:10px 16px;border:1px solid rgba(255,90,54,.5);border-radius:999px;color:var(--accent);font:800 22px/1 "IBM Plex Mono",monospace;letter-spacing:.12em}
      .prefix{margin-top:42px;font-size:62px;font-weight:900;letter-spacing:-.04em}.number-row{display:flex;align-items:flex-end;gap:18px;margin:30px 0 36px}
      .value{color:var(--accent);font-size:210px;font-weight:950;line-height:.75;letter-spacing:-.08em;font-variant-numeric:tabular-nums}.unit{padding-bottom:18px;color:var(--accent);font-size:68px;font-weight:900}
      .caption{max-width:820px;color:rgba(244,239,231,.78);font-size:34px;line-height:1.55}.slash{position:absolute;right:80px;bottom:58px;width:220px;height:12px;background:var(--accent);transform:skewX(-22deg)}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <section id="big-number-scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="card"><div class="grid"></div><div class="content" data-layout-allow-overlap><div id="eyebrow" class="eyebrow"></div><div id="prefix" class="prefix"></div><div class="number-row"><span id="value" class="value"></span><span id="unit" class="unit"></span></div><div id="caption" class="caption"></div></div><div class="slash"></div></div>
      </section>
    </div>
    <script>
      const fallback={eyebrow:"核心结论",prefix:"效率提升",value:3.2,unit:"倍",caption:"同样的选题流程，AI 参与后从整理资料到产出初稿明显提速。",accent:"#FF5A36",foreground:"#F4EFE7"};
      const v=window.__hyperframes?.getVariables?window.__hyperframes.getVariables():fallback;document.documentElement.style.setProperty("--accent",v.accent);document.documentElement.style.setProperty("--fg",v.foreground);
      for(const id of ["eyebrow","prefix","value","unit","caption"])document.getElementById(id).textContent=v[id];
      window.__timelines=window.__timelines||{};const tl=gsap.timeline({paused:true});
      tl.from(".card",{opacity:0,y:70,scale:.96,duration:.7,ease:"expo.out"},.15).from(".eyebrow",{opacity:0,x:-30,duration:.35,ease:"power3.out"},.45).from(".prefix",{opacity:0,y:35,duration:.45,ease:"power3.out"},.58).from(".value",{opacity:0,scale:.55,transformOrigin:"left bottom",duration:.75,ease:"back.out(1.5)"},.78).from(".unit",{opacity:0,y:36,duration:.36,ease:"power2.out"},1.12).from(".caption",{opacity:0,y:28,duration:.45,ease:"power3.out"},1.28).from(".slash",{scaleX:0,transformOrigin:"left center",duration:.5,ease:"power3.out"},1.42).to(".scene",{opacity:0,y:-30,duration:.42,ease:"power2.in"},4.45);
      window.__timelines.main=tl;
    </script>
  </body>
</html>
