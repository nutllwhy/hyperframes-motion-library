<!doctype html>
<html lang="zh-CN" data-composition-variables='[{"id":"title","type":"string","label":"标题","default":"为什么效率会提升？"},{"id":"cause","type":"string","label":"原因","default":"重复动效被模板化"},{"id":"mechanism","type":"string","label":"机制","default":"只修改文案和数据"},{"id":"result","type":"string","label":"结果","default":"新视频能快速生成"},{"id":"accent","type":"color","label":"强调色","default":"#FF5A36"},{"id":"foreground","type":"color","label":"文字色","default":"#F4EFE7"}]'>
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
      body { font-family: "IBM Plex Mono", monospace; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: transparent; color: var(--foreground); }
      .scene { position: absolute; inset: 0; display: grid; place-items: center; padding: 120px; }
      .cluster { position: relative; width: 1240px; padding: 44px 52px 56px; border-radius: 34px; background: #12100E; border: 2px solid rgba(255,90,54,.34); box-shadow: 0 28px 86px rgba(0,0,0,.34); }
      .title { margin: 0 0 44px; font-size: 46px; line-height: 1.1; letter-spacing: -.055em; font-weight: 900; }
      .cards { display: grid; grid-template-columns: 1fr 76px 1fr 76px 1fr; align-items: center; gap: 22px; }
      .card { min-height: 160px; display: grid; align-content: center; gap: 16px; padding: 26px 28px; border: 1px solid rgba(255,90,54,.28); border-radius: 26px; background: #211C18; }
      .tag { color: var(--accent); font-size: 18px; font-weight: 900; letter-spacing: .16em; }
      .text { margin: 0; color: var(--foreground); font-size: 30px; line-height: 1.22; letter-spacing: -.045em; font-weight: 850; }
      .arrow { color: var(--accent); font-size: 54px; font-weight: 900; text-align: center; }
      .halo { position: absolute; right: -130px; top: -150px; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(255,90,54,.2), transparent 68%); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5.5" data-width="1920" data-height="1080">
      <section id="cause-scene" class="scene clip" data-start="0" data-duration="5.5" data-track-index="1">
        <div class="cluster" data-layout-allow-overflow>
          <div class="halo" data-layout-ignore></div>
          <h1 class="title" id="title"></h1>
          <div class="cards">
            <article class="card"><div class="tag">CAUSE</div><p class="text" id="cause"></p></article>
            <div class="arrow">→</div>
            <article class="card"><div class="tag">MECHANISM</div><p class="text" id="mechanism"></p></article>
            <div class="arrow">→</div>
            <article class="card"><div class="tag">RESULT</div><p class="text" id="result"></p></article>
          </div>
        </div>
      </section>
    </div>
    <script>
      const fallback = { title: "为什么效率会提升？", cause: "重复动效被模板化", mechanism: "只修改文案和数据", result: "新视频能快速生成", accent: "#FF5A36", foreground: "#F4EFE7" };
      const v = window.__hyperframes?.getVariables ? window.__hyperframes.getVariables() : fallback;
      document.documentElement.style.setProperty("--accent", v.accent); document.documentElement.style.setProperty("--foreground", v.foreground);
      for (const id of ["title","cause","mechanism","result"]) document.getElementById(id).textContent = v[id];
      window.__timelines = window.__timelines || {}; const tl = gsap.timeline({ paused: true });
      tl.fromTo(".cluster", { opacity: 0, y: 50, scale: .97 }, { opacity: 1, y: 0, scale: 1, duration: .66, ease: "expo.out" }, .16);
      tl.fromTo(".title", { opacity: 0, x: -34 }, { opacity: 1, x: 0, duration: .44, ease: "circ.out" }, .38);
      tl.fromTo(".card", { opacity: 0, y: 34, scale: .94 }, { opacity: 1, y: 0, scale: 1, duration: .52, stagger: .32, ease: "power3.out" }, .72);
      tl.fromTo(".arrow", { opacity: 0, scaleX: .4 }, { opacity: 1, scaleX: 1, duration: .34, stagger: .32, ease: "back.out(1.7)" }, 1.0);
      tl.fromTo(".halo", { opacity: 0, scale: .7 }, { opacity: 1, scale: 1, duration: 1.1, ease: "sine.out" }, .44);
      tl.to(".scene", { opacity: 0, y: -18, duration: .4, ease: "power2.in" }, 4.92);
      window.__timelines.main = tl;
    </script>
  </body>
</html>
